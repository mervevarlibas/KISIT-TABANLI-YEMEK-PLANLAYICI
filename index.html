<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KISIT TABANLI YEMEK PLANLAYICI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="hero">
        <h1>KISIT TABANLI YEMEK PLANLAYICI</h1>
        <p class="subtitle">Alerji, butce ve hedefe gore guvenli haftalik yemek plani</p>
      </div>

      <section class="card auth-card" id="authCard">
        <h2>Hesabina Giris Yap</h2>
        <p class="muted">Plan olusturmak icin uye ol veya giris yap.</p>
        <form id="authForm">
          <label>
            E-posta
            <input type="email" id="authEmail" required />
          </label>
          <label>
            Sifre
            <input type="password" id="authPassword" minlength="6" required />
          </label>
          <div class="auth-actions">
            <button type="button" id="signupBtn">Uye Ol</button>
            <button type="button" id="loginBtn">Giris Yap</button>
          </div>
        </form>
        <p id="authMessage" class="muted"></p>
      </section>

      <section class="card hidden" id="userCard">
        <div class="user-row">
          <p id="userEmail"></p>
          <button type="button" id="logoutBtn" class="ghost-btn">Cikis Yap</button>
        </div>
      </section>

      <section class="card hidden" id="plannerCard">
        <h2>Kullanici Bilgileri</h2>
        <form id="plannerForm">
          <div class="grid">
            <label>
              Kilo (kg)
              <input type="number" id="weight" min="30" max="250" required />
            </label>
            <label>
              Boy (cm)
              <input type="number" id="height" min="120" max="230" required />
            </label>
            <label>
              Yas
              <input type="number" id="age" min="14" max="100" required />
            </label>
            <label>
              Cinsiyet
              <select id="gender" required>
                <option value="male">Erkek</option>
                <option value="female">Kadin</option>
              </select>
            </label>
            <label>
              Aktivite
              <select id="activity" required>
                <option value="1.2">Dusuk</option>
                <option value="1.375">Hafif</option>
                <option value="1.55" selected>Orta</option>
                <option value="1.725">Yuksek</option>
              </select>
            </label>
            <label>
              Ogun Sayisi
              <select id="mealCount" required>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>
            <label>
              Haftalik Butce (TL)
              <input type="number" id="budget" min="100" step="10" required />
            </label>
            <label>
              Hedef
              <select id="goal" required>
                <option value="lose">Kilo Verme</option>
                <option value="maintain" selected>Dengeli Beslenme</option>
                <option value="gain">Kas Kazanimi</option>
              </select>
            </label>
          </div>

          <label>
            Alerjiler (virgulle ayir) - ornek: gluten, nuts, lactose
            <input type="text" id="allergens" placeholder="gluten, nuts" />
          </label>

          <label>
            Tercihler
            <select id="dietPreference">
              <option value="none">Standart</option>
              <option value="vegan">Vegan</option>
              <option value="vegetarian">Vejetaryen</option>
            </select>
          </label>

          <label>
            Sevmedigi Gidalar (virgulle ayir)
            <input type="text" id="dislikes" placeholder="broccoli, lentil" />
          </label>

          <button type="submit">Plan Uret</button>
        </form>
      </section>

      <section class="card hidden" id="resultCard">
        <div class="result-header">
          <h2>Haftalik Plan</h2>
          <div class="auth-actions">
            <button id="savePlanBtn" type="button">Plani Kaydet</button>
            <button id="replanBtn" type="button">Bu Ogunu Degistir (Demo)</button>
          </div>
        </div>
        <div id="validation"></div>
        <div id="planOutput"></div>
        <h3>Alisveris Listesi</h3>
        <ul id="shoppingList"></ul>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
  </body>
</html>
